# Production docker-compose for the Seller-Market management UI.
#
# Generated/installed at /opt/seller-market-mgmt/docker-compose.yml by
# deploy.sh. Differs from the repo's dev docker-compose.yml in three ways:
#
# 1. Pulls the api image from GHCR — does NOT build locally.
# 2. Postgres has NO host port mapping (only the api container can reach it).
# 3. Volumes are absolute paths under /var/lib/sm-mgmt (so a wipe of the
#    install dir does NOT lose data).
#
# Secrets come from the side-car /opt/seller-market-mgmt/.env file (chmod 600).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mgmt_ui
      POSTGRES_USER: mgmt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/sm-mgmt/postgres:/var/lib/postgresql/data
    # No ports stanza by design — DB is reachable only over the compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mgmt -d mgmt_ui"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: ${MGMT_UI_IMAGE_TAG:-ghcr.io/pesahm/seller-market-mgmt-ui:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://mgmt:${POSTGRES_PASSWORD}@postgres:5432/mgmt_ui
      MGMT_SECRET_KEY: ${MGMT_SECRET_KEY}
      MGMT_CSRF_SECRET: ${MGMT_CSRF_SECRET}
      MGMT_FERNET_KEY_PART1: ${MGMT_FERNET_KEY_PART1}
      # COOKIE_SECURE stays "false" by default because the documented
      # quickstart accesses the UI over plain HTTP on the VPS's IP. When the
      # operator puts Caddy/nginx in front with HTTPS, they should flip this
      # to "true" (and run uvicorn with --forwarded-allow-ips='*' — see the
      # mgmt_ui README "Behind a reverse proxy" section).
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENVIRONMENT: production
      RUN_LOGS_DIR: /var/lib/run_logs
      DEFAULT_OCR_SERVICE_URL: ${DEFAULT_OCR_SERVICE_URL:-http://5.10.248.55:18080}
    ports:
      - "${MGMT_HOST_PORT:-8000}:8000"
    volumes:
      # SSH private keys for talking to trading servers.
      # Mounted read-only — the api container only reads them, never writes.
      - /var/lib/sm-mgmt/ssh_keys:/home/app/.ssh:ro
      # Archived run logs (Phase 6). The janitor (Phase 8) cleans these up
      # past JANITOR_RUN_LOG_RETENTION_DAYS.
      - /var/lib/sm-mgmt/run_logs:/var/lib/run_logs
      # DB-HA (#156): backups dir + the FAILOVER marker. SHARED with the host
      # backup cron so (a) the marker the failover supervisor writes pauses the
      # cron (it can't clobber the live spare) and survives a container
      # recreate, and (b) /admin/ha can read the manifest. BACKUP_DIR must match.
      - /var/lib/sm-mgmt/backups:/var/lib/sm-mgmt/backups

  # Per-host market-data sidecar (issue #108). The api reaches it over the
  # compose network at http://market-data:8077 (the `market_data_url` setting
  # default) for the instrument dropdown (#109) and the fee 20-day price (#111).
  # The data endpoints are public RLC — the MARKET_DATA_* reference account is
  # OPTIONAL (only needed if a future authed endpoint is added). No host port:
  # only the api (same network) consumes it. The api degrades gracefully if it
  # is down, so it is intentionally NOT a hard depends_on.
  market-data:
    image: ${MARKET_DATA_IMAGE_TAG:-ghcr.io/pesahm/seller-market-md:latest}
    restart: unless-stopped
    environment:
      MARKET_DATA_PORT: "8077"
      MARKET_DATA_BROKER: ${MARKET_DATA_BROKER:-}
      MARKET_DATA_USERNAME: ${MARKET_DATA_USERNAME:-}
      MARKET_DATA_PASSWORD: ${MARKET_DATA_PASSWORD:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8077/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: sm_mgmt_net
