# Alembic config for mgmt_ui.
# sqlalchemy.url is intentionally left as a template; the runtime URL is injected
# from the DATABASE_URL env var inside alembic/env.py.

[alembic]
script_location = alembic

# Timestamped, slug-suffixed migration filenames:
#   2026_05_16_1430_ab12cd34_add_users_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS-local timezone for file_template timestamps.
timezone =

# Truncate revision slugs to this many chars.
truncate_slug_length = 40

# Template-driven URL (overridden in env.py from DATABASE_URL).
sqlalchemy.url = driver://user:pass@host/dbname

# Don't emit empty migrations when autogenerate finds no diff.
revision_environment = false

# Versioning paths
version_path_separator = os

# Output formatting for autogenerate hooks (optional; safe defaults).
# [post_write_hooks]
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# -------------------- Logging --------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
