name: Docker Publish (mgmt UI)

# Publishes the management UI as ghcr.io/<repo>-mgmt-ui on every merge to
# main that touches mgmt_ui/**. The trading bot's publish workflow
# (docker-publish.yml) stays separate so the two images version
# independently and don't trigger each other's rebuilds.
#
# Tag scheme: mgmt-ui-vX.Y.Z (so it doesn't collide with the trading-bot's
# vX.Y.Z tags on the same repo).
#
# Triggers:
#   - push to main with changes under mgmt_ui/ or this workflow file
#   - manual workflow_dispatch (lets you re-publish without touching files)

on:
  push:
    branches: [main]
    paths:
      - 'mgmt_ui/**'
      - '.github/workflows/docker-publish-mgmt-ui.yml'
  workflow_dispatch:

# Default to least-privilege; build-and-push elevates to contents: write +
# packages: write at the job level.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-mgmt-ui

jobs:
  test:
    # Gate publish on a green test run. The same suite is also covered by
    # .github/workflows/tests.yml on every PR; running it again here means
    # we never ship a broken image even if someone disables / bypasses the
    # PR check.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mgmt
          POSTGRES_PASSWORD: testpwd
          POSTGRES_DB: mgmt_ui
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'mgmt_ui/pyproject.toml'

      - name: Install mgmt_ui (with dev deps)
        run: |
          cd mgmt_ui
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run mgmt_ui unit tests
        env:
          # Required env that conftest.py / app.settings expect. Test code
          # never touches the real DB / SSH layers via the autouse env-disable
          # fixture; these values just satisfy the Pydantic Settings parser.
          DATABASE_URL: postgresql+asyncpg://mgmt:testpwd@localhost:5432/mgmt_ui
          MGMT_SECRET_KEY: ci-test-secret-key-padded-to-32+-chars-long
          MGMT_CSRF_SECRET: ci-test-csrf-secret-padded-to-32+-chars-long
          MGMT_FERNET_KEY_PART1: O5zV2qGYoRzqQ7bGqz_HCsAhJ_-3W4XhE2_w-9OUSdM=
        run: |
          cd mgmt_ui
          pytest tests/unit -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # creating + pushing the mgmt-ui-vX.Y.Z tag
      packages: write   # writing to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for the "latest tag" lookup below

      - name: Compute next version
        # Same commit-message-prefix → semver-bump logic as the existing
        # docker-publish.yml, but the tag namespace is "mgmt-ui-vX.Y.Z" so it
        # doesn't collide with the trading bot's "vX.Y.Z" tags.
        id: semver
        run: |
          LATEST_TAG="$(git tag --list 'mgmt-ui-v*' --sort=-v:refname | head -n1)"

          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="v0.1.0"
          else
            VERSION="${LATEST_TAG#mgmt-ui-v}"
            MAJOR="$(echo "$VERSION" | cut -d. -f1)"
            MINOR="$(echo "$VERSION" | cut -d. -f2)"
            PATCH="$(echo "$VERSION" | cut -d. -f3)"

            COMMIT_MSG="$(git log -1 --pretty=%B)"
            if echo "$COMMIT_MSG" | grep -qiE "^(breaking|major)"; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMIT_MSG" | grep -qiE "^(feat|feature|minor)"; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next mgmt-ui version: $NEXT_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # github.repository is "PeSahm/Seller-Market" → image name becomes
          # ghcr.io/pesahm/seller-market-mgmt-ui (lowercased by GHCR).
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.semver.outputs.next }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.semver.outputs.next }}
            type=semver,pattern={{major}},value=${{ steps.semver.outputs.next }}
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./mgmt_ui
          file: ./mgmt_ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mgmt-ui
          cache-to: type=gha,mode=max,scope=mgmt-ui

      # Tag creation runs AFTER the image is published so a failed build
      # doesn't leave behind a tag pointing at a non-existent artifact.
      - name: Create and push tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "mgmt-ui-${{ steps.semver.outputs.next }}"
          git push origin "mgmt-ui-${{ steps.semver.outputs.next }}"
