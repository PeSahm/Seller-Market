name: Docker Publish (market-data sidecar)

on:
  push:
    branches: [ main ]
    paths:
      - 'SellerMarket/**'
      - '.github/workflows/docker-publish-market-data.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pesahm/seller-market-md

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Deliberately NO semver git-tag step (unlike the bot/mgmt-ui workflows):
    # the sidecar is pinned by :latest + the immutable short-sha tag, and the
    # mgmt-UI deploy verifies the org.opencontainers.image.revision label ==
    # the merge SHA. This sidesteps the tag-collision class entirely.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=sha,prefix=,format=short

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./SellerMarket
        file: ./SellerMarket/Dockerfile.market_data
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
